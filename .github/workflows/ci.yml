name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔥 Create version tag
    - name: Set Image Tag
      run: echo "IMAGE_TAG=v${{ github.run_number }}" >> $GITHUB_ENV

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }} .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

    # ✅ KEEP EC2 DEPLOYMENT (unchanged)
    - name: Deploy to EC2
      run: |
        echo "${{ secrets.EC2_KEY }}" > key.pem
        chmod 600 key.pem

        ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

        docker stop app || true
        docker rm app || true

        docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

        docker run -d -p 3000:3000 --name app ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

        EOF

    # 🔥 Update K8s repo
    - name: Update K8s Repo
      run: |
        git clone https://${{ secrets.PAT_TOKEN }}@github.com/YOUR_USERNAME/devops-k8s-manifests.git
        cd devops-k8s-manifests

        sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}|" deployment.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .
        git commit -m "Update image to ${{ env.IMAGE_TAG }}"
        git push

    # 🔥 Trigger K8s deployment
    - name: Trigger K8s Deployment
      run: |
        curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          https://api.github.com/repos/YOUR_USERNAME/devops-k8s-manifests/dispatches \
          -d '{"event_type":"deploy"}'
