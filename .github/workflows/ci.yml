name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2️⃣ Set Image Tag
    - name: Set Image Tag
      run: echo "IMAGE_TAG=v${{ github.run_number }}" >> $GITHUB_ENV

    # 3️⃣ Login to DockerHub
    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 4️⃣ Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }} .

    # 5️⃣ Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

    # 🔥 Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    # ✅ FIX: Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🔥 Terraform Init
    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    # 🔥 Terraform Apply
    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve

    # 🔥 Get EC2 Public IP
    - name: Get EC2 IP
      working-directory: terraform
      run: |
        echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

    # ⏳ Wait for EC2 to be ready
    - name: Wait for EC2
      run: sleep 60

    # 🔐 Setup SSH
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

    # 🚀 Deploy to EC2
    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/id_rsa ubuntu@$EC2_IP << EOF

          echo "🔧 Installing Docker if not exists..."
          if ! command -v docker > /dev/null 2>&1; then
            sudo apt update
            sudo apt install -y docker.io
            sudo systemctl start docker
            sudo systemctl enable docker
          fi

          echo "🧹 Cleaning old container..."
          sudo docker stop app || true
          sudo docker rm app || true

          echo "📥 Pulling latest image..."
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

          echo "🚀 Starting container..."
          sudo docker run -d -p 3000:3000 --name app \
            ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

        EOF
